<div id="profile-setup-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 14, 22, 0.95); z-index: 99999; justify-content: center; align-items: center; font-family: sans-serif; color: #fff;">
    <div style="background: #161c2a; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #2a3447; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h3 style="margin-top: 0; color: #3886ff; font-size: 20px; text-align: center;">Complete Your Profile</h3>
        <p style="color: #94a3b8; font-size: 13px; text-align: center; margin-bottom: 25px;">Please confirm your details to finalize your ApexTrade terminal registration.</p>
        
        <form id="profile-setup-form">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 12px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase;">Date of Birth</label>
                <input type="date" id="setup-dob" required style="width: 100%; padding: 12px; background: #0f141c; border: 1px solid #2a3447; border-radius: 6px; color: #fff; font-size: 14px; box-sizing: border-box;">
            </div>
            
            <div style="margin-bottom: 25px;">
                <label style="display: block; font-size: 12px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase;">Gender</label>
                <select id="setup-gender" required style="width: 100%; padding: 12px; background: #0f141c; border: 1px solid #2a3447; border-radius: 6px; color: #fff; font-size: 14px; box-sizing: border-box;">
                    <option value="" disabled selected>Select your gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <button type="submit" style="width: 100%; padding: 12px; background: #00c853; border: none; border-radius: 6px; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; transition: background 0.2s;">
                SAVE & OPEN TERMINAL
            </button>
        </form>
    </div>
</div>
